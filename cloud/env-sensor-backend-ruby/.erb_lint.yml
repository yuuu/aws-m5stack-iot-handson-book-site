glob: "**/*.{html,text,js}{+*,}.erb"
exclude:
  - .aws-sam/**/*
  - vendor/**/*
linters:
  Rubocop:
    enabled: true
    rubocop_config:
      inherit_from:
        - .rubocop.yml
      Style/FrozenStringLiteralComment:
        Enabled: false
      Layout/InitialIndentation:
        Enabled: false
      Layout/TrailingEmptyLines:
        Enabled: false
