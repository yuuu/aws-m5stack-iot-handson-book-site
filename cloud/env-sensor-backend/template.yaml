AWSTemplateFormatVersion: 2010-09-09
Description: >-
  env-sensor-backend

Transform:
- AWS::Serverless-2016-10-31

Globals:
  Function:
    Timeout: 10
    MemorySize: 512
    Runtime: ruby3.4
    Architectures:
      - x86_64
    Environment:
      Variables:
        SENSOR_READINGS_TABLE: !Ref SensorReadingsTable

Resources:
  GetAllItemsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/dashboard/app.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref SensorReadingsTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /
            Method: GET

  SensorReadingsTable:
    Type: AWS::Serverless::SimpleTable
    Properties:
      PrimaryKey:
        Name: id
        Type: String
      ProvisionedThroughput:
        ReadCapacityUnits: 2
        WriteCapacityUnits: 2

  IoTTopicRuleDynamoDBv2:
    Type: AWS::IoT::TopicRule
    Properties:
      RuleName: StorageTemperature
      TopicRulePayload:
        Sql: SELECT topic(2) AS id, timestamp() AS timestamp, value FROM 'temperature/#'
        RuleDisabled: false
        Actions:
          - DynamoDBv2:
              PutItem:
                TableName: !Ref SensorReadingsTable
              RoleArn: !GetAtt IoTTopicRuleIAMRole.Arn

  IoTTopicRuleIAMRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: IAMRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - iot.amazonaws.com
            Action:
              - 'sts:AssumeRole'
      Policies:
        - PolicyName: IoTRuleDynamoDBPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                Resource: !GetAtt SensorReadingsTable.Arn

Outputs:
  WebEndpoint:
    Description: "API Gateway endpoint URL for Prod stage"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/Prod/"
